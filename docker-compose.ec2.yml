version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.ci
    image: crm-backend:latest
    container_name: crm-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      # Using existing MongoDB Atlas - no migration needed!
      - SPRING_DATA_MONGODB_URI=mongodb+srv://dev_divisha_app:Divisha%40123@cluster0.btsspaw.mongodb.net/crm_prod?appName=Cluster0
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ALLOWED_ORIGINS=https://crm.ascendons.com,https://ascendons.com,http://crm.ascendons.com,http://ascendons.com,http://localhost:3000
      - JAVA_OPTS=-Xms128m -Xmx384m -XX:+UseContainerSupport
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/actuator/health"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - crm-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.ci
    image: crm-frontend:latest
    container_name: crm-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.ascendons.com/api/v1
      - NEXT_PUBLIC_APP_URL=https://crm.ascendons.com
    deploy:
      resources:
        limits:
          memory: 256m
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - crm-network

  nginx:
    image: nginx:alpine
    container_name: crm-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.http.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/logs:/var/log/nginx
      - ./nginx/certbot:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    networks:
      - crm-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  crm-network:
    driver: bridge
