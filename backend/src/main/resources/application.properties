# Application Name
spring.application.name=crm-backend

# Server Configuration
server.port=8080
server.servlet.context-path=/api/v1

# MongoDB Configuration
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI}

spring.data.mongodb.auto-index-creation=true

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Logging
logging.level.com.ultron.backend=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# CORS Configuration (will be handled in code for flexibility)
cors.allowed-origins=http://localhost:3000,https://crm.ascendons.com,http://52.20.26.167

# Timezone Configuration (IST - Indian Standard Time)
# Sets default timezone for the entire application
spring.jackson.time-zone=Asia/Kolkata
user.timezone=Asia/Kolkata

# Jackson Configuration
spring.jackson.default-property-inclusion=non_null

# Health Check - Disable MongoDB health indicator
management.health.mongo.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.actuate.autoconfigure.mongo.MongoHealthContributorAutoConfiguration

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
