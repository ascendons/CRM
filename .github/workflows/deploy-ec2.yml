name: Deploy to EC2

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to EC2 t3.micro
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2-key.pem
          chmod 600 ~/.ssh/ec2-key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      # ── Build backend JAR on the runner (7 GB RAM, not the 1 GB t3.micro) ──
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build backend JAR
        run: |
          cd backend
          ./mvnw clean package -DskipTests -q
          echo "JAR built: $(ls target/*.jar)"

      # ── Build frontend on the runner ──
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        run: |
          cd frontend
          # package-lock.json was generated on macOS so lightningcss-linux-x64-gnu
          # is missing from it. Drop the lock and reinstall to get the correct
          # platform-specific optional binary.
          rm -rf node_modules package-lock.json
          npm install
          npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

      # ── Prepare active nginx config locally before rsync ──
      - name: Prepare nginx config
        run: cp nginx/nginx.http.conf nginx/active.conf

      # ── Copy all artifacts to EC2 ──
      - name: Copy files to EC2
        run: |
          rsync -avz -e "ssh -i ~/.ssh/ec2-key.pem -o StrictHostKeyChecking=no" \
            --exclude '.git' \
            --exclude 'backend/src' \
            --exclude 'backend/.mvn' \
            --exclude 'backend/mvnw' \
            --exclude 'backend/target/classes/' \
            --exclude 'backend/target/generated-sources/' \
            --exclude 'backend/target/generated-test-sources/' \
            --exclude 'backend/target/test-classes/' \
            --exclude 'backend/target/maven-archiver/' \
            --exclude 'backend/target/maven-status/' \
            --exclude 'frontend/node_modules' \
            --exclude 'frontend/.next/cache' \
            --exclude '*.log' \
            --exclude '.DS_Store' \
            ./ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/crm/

      # ── Write .env on EC2 with JWT_SECRET ──
      - name: Write .env on EC2
        run: |
          ssh -i ~/.ssh/ec2-key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
          cat > ~/crm/.env << ENVEOF
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          ENVEOF
          chmod 600 ~/crm/.env
          EOF

      # ── Start containers on EC2 (no build — images use pre-built artifacts) ──
      - name: Deploy on EC2
        timeout-minutes: 15
        run: |
          ssh -i ~/.ssh/ec2-key.pem \
            -o ServerAliveInterval=60 \
            -o ServerAliveCountMax=20 \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
          set -e
          cd ~/crm

          echo "Freeing memory..."
          sudo sync && sudo sh -c 'echo 3 > /proc/sys/vm/drop_caches' || true
          free -h

          echo "Stopping old containers..."
          sudo docker-compose -f docker-compose.ec2.yml down --remove-orphans || true
          sudo docker image prune -f || true

          echo "Building Docker images from pre-built artifacts..."
          sudo docker-compose -f docker-compose.ec2.yml build --no-cache 2>&1 | tee /tmp/build.log
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "Build failed:"
            tail -50 /tmp/build.log
            exit 1
          fi

          echo "Starting containers..."
          sudo docker-compose -f docker-compose.ec2.yml up -d 2>&1 | tee /tmp/up.log
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            cat /tmp/up.log
            exit 1
          fi

          echo "Waiting for backend to be healthy (up to 4 min)..."
          timeout 240 bash -c '
            until sudo docker inspect --format="{{.State.Health.Status}}" crm-backend 2>/dev/null | grep -q "healthy"; do
              STATUS=$(sudo docker inspect --format="{{.State.Health.Status}}" crm-backend 2>/dev/null || echo "starting")
              echo "  backend: $STATUS"
              sleep 10
            done
          ' || {
            echo "Backend did not become healthy. Logs:"
            sudo docker logs crm-backend --tail 60
            exit 1
          }

          echo "Waiting for frontend to respond (up to 2 min)..."
          timeout 120 bash -c '
            until curl -sf http://localhost:3000 > /dev/null 2>&1; do
              STATUS=$(sudo docker inspect --format="{{.State.Status}}" crm-frontend 2>/dev/null || echo "unknown")
              echo "  frontend container: $STATUS"
              sleep 10
            done
          ' || {
            echo "Frontend did not respond. Logs:"
            sudo docker logs crm-frontend --tail 60
            exit 1
          }

          echo ""
          sudo docker-compose -f docker-compose.ec2.yml ps
          echo ""
          echo "Deployment successful!"
          ENDSSH

      # ── Setup SSL via Let's Encrypt (skipped if cert already valid) ──
      - name: Setup SSL
        run: |
          ssh -i ~/.ssh/ec2-key.pem \
            -o ServerAliveInterval=60 \
            -o ServerAliveCountMax=10 \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
          set -e
          cd ~/crm

          CERT_PATH="/etc/letsencrypt/live/crm.ascendons.com/fullchain.pem"
          SSL_DIR=~/crm/nginx/ssl
          mkdir -p "$SSL_DIR"

          # Check if cert is valid for >30 days; if so, skip
          if openssl x509 -checkend 2592000 -noout -in "$CERT_PATH" 2>/dev/null; then
            echo "SSL cert is valid, skipping certbot."
          else
            echo "Obtaining SSL certificate from Let's Encrypt..."

            # Install certbot if needed
            if ! command -v certbot &>/dev/null; then
              sudo apt-get install -y certbot
            fi

            # Use webroot — nginx is already serving port 80
            sudo certbot certonly --webroot \
              -w ~/crm/nginx/certbot \
              -d crm.ascendons.com \
              --email dev@ascendons.in \
              --agree-tos \
              --non-interactive \
              --keep-until-expiring

            echo "Copying certs..."
            sudo mkdir -p ~/crm/nginx/ssl
            sudo cp /etc/letsencrypt/live/crm.ascendons.com/fullchain.pem ~/crm/nginx/ssl/
            sudo cp /etc/letsencrypt/live/crm.ascendons.com/privkey.pem ~/crm/nginx/ssl/
            sudo chown ubuntu:ubuntu ~/crm/nginx/ssl/*.pem
          fi

          # Switch to HTTPS nginx config if cert exists
          if [ -f ~/crm/nginx/ssl/fullchain.pem ]; then
            echo "Switching nginx to HTTPS config..."
            cp ~/crm/nginx/nginx.conf ~/crm/nginx/active.conf
            sudo docker exec crm-nginx nginx -s reload
            echo "nginx reloaded with HTTPS config."
          else
            echo "No cert found, staying on HTTP config."
          fi
          ENDSSH

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/ec2-key.pem
