name: Deploy to EC2

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  deploy:
    name: Deploy to EC2 t3.micro
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # Deploy to EC2
      - name: 🔐 Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2-key.pem
          chmod 600 ~/.ssh/ec2-key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: 📤 Copy files to EC2
        run: |
          rsync -avz -e "ssh -i ~/.ssh/ec2-key.pem -o StrictHostKeyChecking=no" \
            --exclude 'node_modules' \
            --exclude '.git' \
            --exclude 'backend/target' \
            --exclude 'frontend/.next' \
            --exclude 'frontend/node_modules' \
            --exclude '*.log' \
            --exclude '.DS_Store' \
            ./ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/crm/

      - name: 🚀 Deploy on EC2
        run: |
          ssh -i ~/.ssh/ec2-key.pem \
            -o ServerAliveInterval=60 \
            -o ServerAliveCountMax=30 \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            'set -e
            cd ~/crm

            echo "📊 Stopping containers..."
            sudo docker-compose -f docker-compose.ec2.yml down --remove-orphans

            echo "🏗️  Building and starting containers (background)..."
            nohup sudo docker-compose -f docker-compose.ec2.yml up -d --build > /tmp/deploy.log 2>&1

            echo "⏳ Waiting for build to finish..."
            timeout 600 bash -c "
              while sudo docker-compose -f ~/crm/docker-compose.ec2.yml ps | grep -q \"Build\|build\|building\"; do
                sleep 10
              done
            " || true

            sleep 20

            echo "📊 Container status:"
            sudo docker-compose -f docker-compose.ec2.yml ps

            echo "=== Deploy log tail ==="
            tail -30 /tmp/deploy.log || true

            echo "✅ Deployment triggered!"'

      - name: 🧹 Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/ec2-key.pem
