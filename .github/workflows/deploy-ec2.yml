name: Deploy to EC2

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  deploy:
    name: Deploy to EC2 t3.micro
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # Backend Build & Test
      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: 🔨 Build Backend
        working-directory: ./backend
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      - name: 🧪 Run Backend Tests
        working-directory: ./backend
        run: ./mvnw test
        continue-on-error: true

      # Frontend Build & Test
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: 📥 Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: 🧪 Run Frontend Linter
        working-directory: ./frontend
        run: npm run lint || true
        continue-on-error: true

      # Deploy to EC2
      - name: 🔐 Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2-key.pem
          chmod 600 ~/.ssh/ec2-key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: 📤 Copy files to EC2
        run: |
          rsync -avz -e "ssh -i ~/.ssh/ec2-key.pem -o StrictHostKeyChecking=no" \
            --exclude 'node_modules' \
            --exclude '.git' \
            --exclude 'backend/target' \
            --exclude 'frontend/.next' \
            --exclude 'frontend/node_modules' \
            --exclude '*.log' \
            --exclude '.DS_Store' \
            ./ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/crm/

      - name: 🚀 Deploy on EC2
        run: |
          ssh -i ~/.ssh/ec2-key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e
            cd ~/crm

            echo "📊 Stopping containers..."
            sudo docker-compose -f docker-compose.ec2.yml down

            echo "🏗️  Building and starting containers..."
            sudo docker-compose -f docker-compose.ec2.yml up -d --build

            echo "⏳ Waiting for containers to be healthy..."
            sleep 15

            echo "📊 Container status:"
            sudo docker-compose -f docker-compose.ec2.yml ps

            echo "✅ Deployment complete!"
          ENDSSH

      - name: ✅ Verify Deployment
        run: |
          echo "Waiting for services to be fully ready..."
          sleep 20

          echo "🔍 Testing Backend Health..."
          BACKEND_RESPONSE=$(curl -s https://api.ascendons.com/api/v1/actuator/health || echo "FAILED")

          if echo "$BACKEND_RESPONSE" | grep -q "UP"; then
            echo "✅ Backend is healthy!"
            echo "$BACKEND_RESPONSE"
          else
            echo "⚠️  Backend health check failed: $BACKEND_RESPONSE"
            exit 1
          fi

          echo "🔍 Testing Frontend..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://crm.ascendons.com)
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "307" ]; then
            echo "✅ Frontend is accessible (HTTP $HTTP_CODE)"
          else
            echo "⚠️  Frontend returned HTTP $HTTP_CODE"
            exit 1
          fi

          echo "🎉 All health checks passed!"

      - name: 📊 Show Deployment Info
        if: always()
        run: |
          ssh -i ~/.ssh/ec2-key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            echo "=== Docker Container Status ==="
            sudo docker-compose -f ~/crm/docker-compose.ec2.yml ps

            echo ""
            echo "=== Recent Logs (last 20 lines) ==="
            sudo docker-compose -f ~/crm/docker-compose.ec2.yml logs --tail=20

            echo ""
            echo "=== System Resources ==="
            free -h
            df -h /
          ENDSSH

      - name: 📝 Deployment Summary
        if: success()
        run: |
          echo "🎉 Deployment successful!"
          echo "🌐 Frontend: https://crm.ascendons.com"
          echo "🔌 Backend API: https://api.ascendons.com/api/v1"
          echo "💚 Health: https://api.ascendons.com/api/v1/actuator/health"

      - name: 🧹 Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/ec2-key.pem

      - name: 📝 Comment on PR
        if: github.event_name == 'pull_request' && success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Deployment Successful!**

              ✅ Frontend: https://crm.ascendons.com
              ✅ Backend API: https://api.ascendons.com/api/v1
              ✅ Health Check: https://api.ascendons.com/api/v1/actuator/health

              Deployed to EC2 t3.micro instance.`
            })
